imageCleaner:
    enabled: true
    # when 80% of inodes are used,
    # cull images until only 40% are used.
    imageGCThresholdHigh: 80
    imageGCThresholdLow: 40

# Customization of BinderHub Webpage interface (Optional)
initContainers:
  - name: git-clone-templates
    image: alpine/git
    command:
      - /bin/sh
      - -c
      - |
        rm -rf /etc/binderhub/custom/iai && \
        git clone -b dev https://github.com/yxzhan/binderhub-custom-files.git /etc/binderhub/custom/iai
    securityContext:
      runAsUser: 0
    volumeMounts:
      - name: custom-templates
        mountPath: /etc/binderhub/custom

extraVolumes:
  - name: custom-templates
    emptyDir: {}

extraVolumeMounts:
  - name: custom-templates
    mountPath: /etc/binderhub/custom


extraConfig:
  custom_config: |
    c.Launcher.retries = 1

config:
  BinderHub:
    template_path: /etc/binderhub/custom/iai/templates
    extra_static_path: /etc/binderhub/custom/iai/static
    extra_static_url_prefix: /extra_static/
    template_variables:
        EXTRA_STATIC_URL_PREFIX: "/extra_static/"
    use_registry: true
    image_prefix: intel4coro/
    hub_url: https://jupyter.dev.intel4coro.de
    KubernetesBuildExecutor:
      build_image: quay.io/jupyterhub/repo2docker:2024.07.0-19.gbf618ef
      # cpu_limit: 16
      memory_request: 1G
      memory_limit: 10G
    # build_node_selector:
    #   kubernetes.io/hostname: gpu-worker


jupyterhub:
  cull:
    # cull every 5 minutes so it is out of phase
    every: 300
    # with the proxy check-routes interval of 5 minutes
    timeout: 300
    # maxAge is 24 hours: 24 * 3600 = 86400
    maxAge: 14400
  hub:
    networkPolicy:
      enabled: true
    extraConfig:
      # Set user pod run as root user
      custom-securityContex: |
        c.BinderSpawner.uid = 0
        c.BinderSpawner.gid = 0
        # c.BinderSpawner.allow_privilege_escalation = True
        # c.BinderSpawner.privileged = True
        # c.BinderSpawner.args = [
        #   "--allow-root",
        # ]
      # Overwrite the default timeout settings to be more tolerant of slow startups
      01-timeout: |
        c.Spawner.start_timeout = 120
        c.Spawner.http_timeout = 120
        c.Spawner.consecutive_failure_limit = 10
