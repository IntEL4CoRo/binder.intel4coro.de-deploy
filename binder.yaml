    cloudMetadata:
      blockWithIptables: false
    networkPolicy:
      enabled: true
      egressAllowRules:
        privateIPs: false
        nonPrivateIPs: true
    extraEnv:
      LP_NUM_THREADS: "4"
      NVIDIA_DRIVER_CAPABILITIES: "all"
      # VGL_DISPLAY: "egl"
      # VGL_ISACTIVE: "1"
      # LD_PRELOAD: "libdlfaker.so:libvglfaker.so"
      ACCEPT_EULA: "YES"
      PRIVACY_CONSENT: "YES"
      OMNI_KIT_ACCEPT_EULA: "YES"
      OMNI_KIT_ALLOW_ROOT: "1"
    memory:
      guarantee: 1G
      # limit: 20G
    cpu:
      guarantee: 1
      # limit: 12
    extraResource:
      guarantees:
        nvidia.com/gpu: "1"
      limits:
        nvidia.com/gpu: "1"
